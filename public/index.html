const { useState, useEffect, useCallback, useRef } = React;

// ===== 正则解析：从微博文字直接提取信息，无需 AI =====

// 预处理：全角数字→半角，全角标点统一化，特殊连字符统一化
function normalize(text) {
  return text
    // 全角数字 → 半角
    .replace(/[\uFF10-\uFF19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFF10 + 48))
    // 全角字母 → 半角
    .replace(/[\uFF21-\uFF3A]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFF21 + 65))
    .replace(/[\uFF41-\uFF5A]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFF41 + 97))
    // 全角冒号/句号/斜杠 → 半角
    .replace(/\uff1a/g, ":").replace(/\uff0e/g, ".").replace(/\uff0f/g, "/")
    // 全角括号 → 半角
    .replace(/\uff08/g, "(").replace(/\uff09/g, ")")
    // 各种连字符/波浪线统一 → ~
    .replace(/[～〜]/g, "~")
    // 各种间隔号/中点统一 → ·
    .replace(/[・·•]/g, "·")
    // 各种空格统一 → 普通空格
    .replace(/[\u3000\u00a0]/g, " ")
    // 圆圈数字 ①②③... → 1 2 3 ...
    .replace(/[①-⑳]/g, c => String(c.charCodeAt(0) - 0x2460 + 1))
    // 装饰性重复符号（如 ✦✦✦）保留一个
    .replace(/([\u2600-\u27BF])\1{2,}/g, "$1");
}

function regexParseEvent(rawText) {
  const text = normalize(rawText);
  const today = new Date();
  const currentYear = today.getFullYear();

  // ── 日期 ──
  let date = "";
  const d4 = text.match(/(\d{4})[.\/年](\d{1,2})[.\/月](\d{1,2})/);
  const activityDateM = text.match(/(?:线下活动时间|活动时间|演出时间|演出日期)[^\d]*(\d{1,2})[月.](\d{1,2})/);
  const d2all = [...text.matchAll(/(?<!\d)(\d{1,2})[.月\/](\d{1,2})[日号]?(?!\d)/g)];
  if (d4) {
    // 忽略文本中的年份，统一用当年
    date = `${currentYear}-${String(d4[2]).padStart(2,"0")}-${String(d4[3]).padStart(2,"0")}`;
  } else if (activityDateM) {
    const mo = parseInt(activityDateM[1]), dy = parseInt(activityDateM[2]);
    date = `${currentYear}-${String(mo).padStart(2,"0")}-${String(dy).padStart(2,"0")}`;
  } else if (d2all.length > 0) {
    let best = null;
    for (const m of d2all) {
      const mo = parseInt(m[1]), dy = parseInt(m[2]);
      if (mo < 1 || mo > 12 || dy < 1 || dy > 31) continue;
      const candidate = `${currentYear}-${String(mo).padStart(2,"0")}-${String(dy).padStart(2,"0")}`;
      if (!best || candidate > best) best = candidate;
    }
    if (best) date = best;
  }

  // ── 时间 ──
  let time = "", endTime = "";

  // 优先找"演出时间"行，支持 | ｜ : ： 作为分隔符
  const showLine = text.match(/演出时间\s*[|｜:：]?\s*(\d{1,2}):(\d{2})\s*[~\-—]\s*(\d{1,2}):(\d{2})/);
  if (showLine) {
    time    = `${String(showLine[1]).padStart(2,"0")}:${showLine[2]}`;
    endTime = `${String(showLine[3]).padStart(2,"0")}:${showLine[4]}`;
  } else {
    const startM = text.match(/(?:START|SHOW|开演|演出)[^\d]*(\d{1,2}):(\d{2})/i);
    const endM   = text.match(/(?:END|结束)[^\d]*(\d{1,2}):(\d{2})/i);
    if (startM) {
      time = `${String(startM[1]).padStart(2,"0")}:${startM[2]}`;
      if (endM) endTime = `${String(endM[1]).padStart(2,"0")}:${endM[2]}`;
    }
    if (!time) {
      const openStart = text.match(/OPEN\s*(\d{1,2}):(\d{2})[^\d]+START\s*(\d{1,2}):(\d{2})/i);
      if (openStart) {
        time = `${String(openStart[3]).padStart(2,"0")}:${openStart[4]}`;
      }
    }
    if (!time) {
      for (const line of text.split("\n")) {
        if (/特典|握手|签名|cheki|チェキ/i.test(line)) continue;
        const tm = line.match(/(\d{1,2}):(\d{2})\s*[~\-—]\s*(\d{1,2}):(\d{2})/);
        if (tm) {
          time    = `${String(tm[1]).padStart(2,"0")}:${tm[2]}`;
          endTime = `${String(tm[3]).padStart(2,"0")}:${tm[4]}`;
          break;
        }
      }
    }
    if (!time) {
      const sm = text.match(/(\d{1,2}):(\d{2})/);
      if (sm) time = `${String(sm[1]).padStart(2,"0")}:${sm[2]}`;
    }
  }

  // ── 场馆 ──
  let venue = "";
  const venuePatterns = [
    /📍\s*([^\n]+)/,
    /🏟️?\s*([^\n]+)/,
    /🔴\s*([^\n]+)/,
    /🎐\s*([^\n]+)/,
    /🏠\s*([^\n]+)/,
    /🎪\s*([^\n]+)/,
    /地[点址场]\s*[:：|｜]\s*([^\n]+)/,
    /(?:演出)?地点\s*[:：|｜]\s*([^\n]+)/,
    /会场\s*[:：|｜]\s*([^\n]+)/,
    /场馆\s*[:：|｜]\s*([^\n]+)/,
    /venue\s*[:：]\s*([^\n]+)/i,
  ];
  for (const p of venuePatterns) {
    const m = text.match(p);
    if (m) {
      let v = m[1].split("\n")[0].trim();
      // 截断到下一个 emoji、票价、购票关键词
      v = v.replace(/[\u{1F300}-\u{1FFFF}]/u, '\x00').split('\x00')[0];
      v = v.split(/[🎫🎟💰]|预售票|当日票|购票|¥|\d+R\+/)[0].trim();
      // 如果包含完整地址（市区路），提取 • 后面的场馆名
      const venuePart = v.match(/[•·]\s*(.+)$/);
      if (venuePart) {
        v = venuePart[1].trim();
      } else {
        v = v.replace(/^[\u4e00-\u9fa5]+[市省]\S{1,10}[市]\S{0,10}[区县]\S*/, "").trim();
        v = v.replace(/^[\u4e00-\u9fa5]+[区县]\S{0,15}[路街道号]\S{0,6}/, "").trim();
      }
      v = v.replace(/\s*[\(（].*/, "").trim();
      if (v.length >= 2) { venue = v; break; }
    }
  }
  if (!venue) {
    for (const line of text.split("\n")) {
      if (/LIVE|livehouse|live\s*house|现场|剧场|Theater|theater|Hall|hall|Studio|studio|ライブ|アイドル/i.test(line) && line.length < 80) {
        let v = line.replace(/^[\s\u2600-\u27BF\uD83C\uD000-\uD83D\uDFFF\uD83E\uD000-\uD83E\uDFFF●•·]+/, "").trim();
        // 同样提取•后面的场馆名
        const vp = v.match(/[•·]\s*(.+)$/);
        if (vp) v = vp[1].trim();
        v = v.replace(/\s*[\(（].*/, "").trim();
        if (v) { venue = v; break; }
      }
    }
  }

  // ── 城市 ──
  let city = "";
  const cities = ["北京","上海","广州","深圳","成都","杭州","武汉","南京","西安","重庆","天津","苏州","青岛","长沙","厦门","福州","郑州","济南","合肥","宁波","沈阳","大连","哈尔滨","昆明","贵阳","南宁","海口","东莞","佛山","珠海","温州","南昌","长春","太原","石家庄","兰州","西宁","银川","呼和浩特","乌鲁木齐"];
  for (const c of cities) { if (text.includes(c)) { city = c; break; } }

  // ── 演出名称 ──
  let title = "";
  for (const line of rawText.split("\n")) {
    // 剥离行首所有 emoji（包含代理对）、符号、@等
    const clean = line
      .replace(/^[\s\uD800-\uDFFF\u2600-\u27BF\uFE00-\uFE0F\u20D0-\u20FF●•·#＃★☆◆◇■□▶▷→✦@！!]+/g, "")
      .replace(/^\uD83C[\uDC00-\uDFFF]|^\uD83D[\uDC00-\uDFFF]|^\uD83E[\uDC00-\uDFFF]/g, "")
      .trim();
    if (clean.length < 3) continue;
    if (/^(https?:|转发|评论|点赞|@|查看更多)/.test(clean)) continue;
    if (/^\d{4}[.\/年]\d{1,2}/.test(normalize(clean))) continue;
    if (/^\d{1,2}:\d{2}/.test(normalize(clean))) continue;
    title = clean;
    break;
  }

  // ── 团体名 ──
  let group = "";
  // 优先：明确标注的参演团体列表
  const groupListM = text.match(/(?:参演|演出|参与|出演|嘉宾)?团体[：:]\s*([\s\S]+?)(?=🕰|🎫|🔴|🏟|📍|演出时间|特典时间|开票|$|\n\n)/);
  if (groupListM) {
    // 清理 emoji、空格，按常见分隔符拆分
    const raw = groupListM[1];
    const names = raw
      .replace(/[\u{1F300}-\u{1FFFF}]/gu, " ")  // 去掉 emoji（基本平面外）
      .replace(/[\u2600-\u27BF]/g, " ")           // 去掉基本平面内 emoji（❄☆★等）
      .replace(/\uFE0F/g, "")                      // 去掉 variation selector
      .split(/[、,，&+\/\s]+/)
      .map(s => s.trim())
      .filter(s => s.length >= 2 && s.length <= 20);
    if (names.length) group = names.join(",");
  }
  // 退而求其次：从活动名称推断（如"XX周年演唱会"）
  if (!group) {
    const gm = text.match(/(.{2,15}?)(?:一周年|周年|演唱会|巡演|Live Tour|idol live)/i);
    if (gm) group = gm[1].replace(/^[\s\uD800-\uDFFF\u2600-\u27BF]+/, "").trim();
  }

  return { title, date, time, endTime, venue, city, group };
}

function regexParseBirthday(rawText) {
  const text = normalize(rawText);
  let name = "", birthday = "", group = "";

  // ── 生日 ──
  const bd4 = text.match(/(\d{4})[.\/年](\d{1,2})[.\/月](\d{1,2})/);
  const bd2 = text.match(/(?<!\d)(\d{1,2})[月.\/](\d{1,2})[日号]?(?!\d)/);
  if (bd4) {
    birthday = `${bd4[1]}-${String(bd4[2]).padStart(2,"0")}-${String(bd4[3]).padStart(2,"0")}`;
  } else if (bd2) {
    birthday = `2000-${String(bd2[1]).padStart(2,"0")}-${String(bd2[2]).padStart(2,"0")}`;
  }

  // ── 姓名 ──
  const namePatterns = [
    /祝\s*(.{1,8}?)\s*(?:生日快乐|happy\s*birthday)/i,
    /(.{1,8}?)(?:的)?(?:生日|birthday|诞生日)/i,
    /^(.{2,8})$/m,
  ];
  for (const p of namePatterns) {
    const m = text.match(p);
    if (m) {
      const c = m[1].replace(/^[\s\uD800-\uDFFF\u2600-\u27BF🎂🎉]+/, "").trim();
      if (c.length >= 2 && c.length <= 8 && !/^\d/.test(c)) { name = c; break; }
    }
  }

  // ── 团体 ──
  const gm = text.match(/(?:来自|成员|所属)[：:\s]*(.{2,15}?)(?:\s|$)/);
  if (gm) group = gm[1].trim();

  return { name, birthday, group };
}

// ===== API 调用（部署到 Vercel 后生效，本地双击打开时跳过）=====
const IS_DEPLOYED = location.protocol === "https:" && !location.hostname.includes("localhost");

async function apiFetch(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`/api/weibo?${qs}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// 通过微博帖子链接抓取文字
function base62ToMid(b62) {
  const chars = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let result = "";
  for (let i = b62.length; i > 0; i -= 4) {
    const seg = b62.slice(Math.max(0, i-4), i);
    let num = 0;
    for (const c of seg) { const idx = chars.indexOf(c); if (idx===-1) return null; num = num*62+idx; }
    result = String(num).padStart(i===b62.length?1:7,"0") + result;
  }
  return result || null;
}

async function fetchPostText(url) {
  const m = url.trim().match(/weibo\.com\/[^/?#]+\/([A-Za-z0-9]+)/);
  if (!m) throw new Error("无法识别微博链接格式");
  const rawId = m[1];
  const mid = /^\d+$/.test(rawId) ? rawId : base62ToMid(rawId);
  if (!mid) throw new Error("无法解析微博 ID");
  const data = await apiFetch({ mid });
  const post = data?.data;
  if (!post) throw new Error("该微博无法访问，可能已删除");
  const rawText = post.longText?.longTextContent || post.text || "";
  return rawText
    .replace(/<br\s*\/?>/gi, "\n").replace(/<[^>]+>/g, "")
    .replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"')
    .trim();
}

// 通过账号主页链接抓取用户信息
async function fetchUserInfo(url) {
  const m = url.trim().match(/weibo\.com\/(?:u\/)?(\d+)/);
  if (!m) throw new Error("无法识别微博账号链接，格式应为 weibo.com/u/数字ID");
  const uid = m[1];
  return await apiFetch({ uid }); // { name, description, avatar }
}


const MONTHS = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const DAYS = ["日","一","二","三","四","五","六"];
const C = {
  bg:"#faf7f2", surface:"#f5f0e8", card:"#fff", border:"#e8e0d0",

function loadLS(key, def) { try { return JSON.parse(localStorage.getItem(key) || "null") || def; } catch { return def; } }

// ===== Main App =====
function App() {
  const [page, setPage]   = useState("splash");
  const [year, setYear]   = useState(new Date().getFullYear());
  const [month, setMonth] = useState(new Date().getMonth());
  const [events, setEvents]           = useState(() => loadLS("ic_events", []));
  const [birthdays, setBirthdays]     = useState(() => loadLS("ic_birthdays", []));
  const [anniversaries, setAnnivs]    = useState(() => loadLS("ic_anniversaries", []));
  const [selDay, setSelDay]           = useState(null);
  const [selAnniv, setSelAnniv]       = useState(null); // 当前查看的纪念日/生日详情
  const [modal, setModal]             = useState(null);
  const [weiboText, setWeiboText]     = useState("");
  const [parseError, setParseError]   = useState("");
  const [urlInput, setUrlInput]       = useState("");
  const [urlFetching, setUrlFetching] = useState(false);
  const [parsed, setParsed]           = useState(null); // parsed result from weibo
  const [form, setForm]               = useState({});
  const [editItem, setEditItem]       = useState(null);
  const [editType, setEditType]       = useState(null);
  const [transport, setTransport]     = useState(30);
  const [dupTarget, setDupTarget]     = useState(null);
  const [importCount, setImportCount] = useState({});
  const [statsYear, setStatsYear]     = useState("all");
  const [exportJson, setExportJson]   = useState("");
  const [myGroups, setMyGroups]       = useState(() => loadLS("ic_groups", []));
  const [newGroup, setNewGroup]       = useState("");

  useEffect(() => localStorage.setItem("ic_events", JSON.stringify(events)), [events]);
  useEffect(() => localStorage.setItem("ic_birthdays", JSON.stringify(birthdays)), [birthdays]);
  useEffect(() => localStorage.setItem("ic_anniversaries", JSON.stringify(anniversaries)), [anniversaries]);
  useEffect(() => localStorage.setItem("ic_groups", JSON.stringify(myGroups)), [myGroups]);

  // ── get items for a date ──
  const itemsFor = useCallback((ds) => {
    const out = [];
    events.filter(e => e.date === ds).forEach(e => out.push({...e, _t:"event"}));

    // 生日：每年同月同日
    birthdays.forEach(b => {
      if (!b.birthday) return;
      const [,bm,bd] = b.birthday.split("-");
      if (bm === ds.slice(5,7) && bd === ds.slice(8,10)) out.push({...b, _t:"birthday"});
    });

    // 纪念日：支持逗号分隔多种重复，去重（同一条纪念日同一天只出现一次）
    anniversaries.forEach(a => {
      if (!a.startDate) return;
      const s = new Date(a.startDate); s.setHours(0,0,0,0);
      const c = new Date(ds);          c.setHours(0,0,0,0);
      if (c < s) return; // 起始日之前不显示

      const repeats = (a.repeat || "").split(",").filter(Boolean);
      const diff = Math.round((c - s) / 86400000);
      let matched = false; let _years, _months, _days;

      for (const rt of repeats) {
        if (rt === "yearly") {
          const sm = String(s.getMonth()+1).padStart(2,"0");
          const sd = String(s.getDate()).padStart(2,"0");
          if (sm === ds.slice(5,7) && sd === ds.slice(8,10)) {
            _years = c.getFullYear() - s.getFullYear();
            matched = true;
          }
        } else if (rt === "monthly") {
          if (String(s.getDate()).padStart(2,"0") === ds.slice(8,10)) {
            const mo = (c.getFullYear()-s.getFullYear())*12 + c.getMonth()-s.getMonth();
            if (mo >= 0) { _months = mo; matched = true; }
          }
        } else if (rt === "100days") {
          if (diff > 0 && diff % 100 === 0) { _days = diff; matched = true; }
        }
      }

      // 空 repeat：只在起始日当天显示
      if (repeats.length === 0 && diff === 0) matched = true;

      if (matched) out.push({...a, _t:"anniversary", _years, _months, _days});
    });

    out.sort((a,b) => a._t==="event" && b._t==="event" ? (a.time||"").localeCompare(b.time||"") : 0);
    return out;
  }, [events, birthdays, anniversaries]);

  const eventsWithTransport = useCallback((ds) => {

      a.href = url;
      a.download = `LiveLog-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);

      setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
      return true;
    } catch(e) { return false; }

          const ids = new Set(existing.map(x => x.id));
          return [...existing, ...incoming.filter(x => !ids.has(x.id))];

        alert("导入失败：" + err.message);

            {page==="anniv-detail"

              : <><span style={{fontSize:13,fontWeight:900,color:"#ff6bab",fontFamily:"'Nunito',sans-serif",letterSpacing:"-0.5px"}}>Live</span><span style={{fontSize:13,fontWeight:900,color:C.teal,fontFamily:"'Nunito',sans-serif",letterSpacing:"-0.5px"}}>Log</span></>

      <div style={{ width:"100%", maxWidth:480, padding:"6px 20px", display:"flex", gap:8, overflowX:"auto", scrollbarWidth:"none", msOverflowStyle:"none" }}>
        {[
          ["🎤 ＋演出", () => { setModal("add-event"); resetParse(); setForm({}); }, C.accent,    ["calendar","list"]],
          ["🎂 ＋生日", () => { setModal("add-birthday"); resetParse(); setForm({}); }, "#f0a830", ["calendar","annivs"]],
          ["💫 ＋纪念日", () => { setModal("add-anniv"); setForm({repeat:""}); }, C.teal,         ["calendar","annivs"]],
        ].filter(([,,, pages]) => pages.includes(page))
        .map(([lbl,fn,clr]) => (
          <button key={lbl} onClick={fn} style={{ background:"#fff", border:`2px solid ${clr}`, color:clr, borderRadius:20, padding:"6px 14px", fontSize:12, cursor:"pointer", whiteSpace:"nowrap", fontWeight:800, boxShadow:`0 2px 0 0 ${clr}44` }}>{lbl}</button>
        ))}
        {page !== "annivs" && page !== "anniv-detail" && (
          <button onClick={()=>setModal("stats")} style={{ background:"#fff", border:"2px solid #c97de8", color:"#c97de8", borderRadius:20, padding:"6px 12px", fontSize:12, cursor:"pointer", fontWeight:800, boxShadow:"0 2px 0 0 #c97de844", display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap", marginLeft:"auto", flexShrink:0 }}>
            <svg width="14" height="14" viewBox="0 0 32 32"><path d="M16 2 A14 14 0 0 1 30 16 L16 16 Z" fill="#f0a830"/><path d="M30 16 A14 14 0 0 1 9 28 L16 16 Z" fill="#ff6bab"/><path d="M9 28 A14 14 0 0 1 2 12 L16 16 Z" fill="#c97de8"/><path d="M2 12 A14 14 0 0 1 16 2 L16 16 Z" fill="#5ecec8"/></svg>
            演出统计

      {/* ── 日历 视图 ── */}
      {page === "calendar" && <>
      {/* Day headers */}
      <div style={{ width:"100%", maxWidth:480, padding:"10px 20px 4px", display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
        {DAYS.map(d => <div key={d} style={{ textAlign:"center", fontSize:11, color:C.muted, fontWeight:600 }}>{d}</div>)}
      </div>

      {/* Calendar grid */}
      <div style={{ width:"100%", maxWidth:480, padding:"0 20px", display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`e${i}`} />;
          const ds = fmt(year, month, day);
          const items = itemsFor(ds);
          const isToday = ds === today;
          const isSel = ds === selDay;
          return (
            <div key={day} onClick={() => { setSelDay(ds === selDay ? null : ds); }}
              style={{ background: isSel?"#ff6bab":isToday?"#e0faf8":"#fff", border:`2px solid ${isToday?C.teal:isSel?C.accent:C.border}`, borderRadius:10, padding:"6px 4px", minHeight:54, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2, boxShadow:isToday?`0 3px 0 0 ${C.teal}66`:"none", transition:"transform .1s" }}>
              <span style={{ fontSize:13, fontWeight:(isToday||isSel)?800:400, color:isSel?"#fff":isToday?C.accent:C.text }}>{day}</span>
              <div style={{ display:"flex", flexWrap:"wrap", gap:2, justifyContent:"center" }}>
                {items.some(i=>i._t==="event") && <span style={{ width:5, height:5, borderRadius:"50%", background:isSel?"rgba(255,255,255,0.9)":C.coral }} />}
                {items.some(i=>i._t==="birthday") && <span style={{ width:5, height:5, borderRadius:"50%", background:isSel?"rgba(255,255,255,0.9)":C.gold }} />}
                {items.some(i=>i._t==="anniversary") && <span style={{ width:5, height:5, borderRadius:"50%", background:isSel?"rgba(255,255,255,0.9)":C.teal }} />}
              </div>
              {items.length > 0 && <span style={{ fontSize:9, color:isSel?"rgba(255,255,255,0.8)":C.muted }}>{items.length}项</span>}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ display:"flex", gap:16, marginTop:10, fontSize:11, color:C.muted }}>
        <span><span style={{color:C.coral}}>●</span> 演出</span>
        <span><span style={{color:C.gold}}>●</span> 生日</span>
        <span><span style={{color:C.teal}}>●</span> 纪念日</span>
      </div>

      {/* ── 当日详情面板 ── */}
      {selDay && (() => {
        const evs = eventsWithTransport(selDay);
        const nonEvs = itemsFor(selDay).filter(i => i._t !== "event");
        const allItems = [...evs, ...nonEvs];
        const [dy, dm, dd] = selDay.split("-");
        const weekday = ["日","一","二","三","四","五","六"][new Date(selDay).getDay()];
        return (
          <div style={{width:"100%",maxWidth:480,marginTop:12,background:"#fff",borderRadius:16,border:`2px solid ${C.border}`,boxShadow:`0 4px 0 0 ${C.border}`,overflow:"hidden"}}>
            {/* 面板标题 */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px 10px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontSize:18,fontWeight:900,color:C.text}}>{parseInt(dm)}月{parseInt(dd)}日</span>
                <span style={{fontSize:12,color:C.muted,fontWeight:700}}>周{weekday}</span>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>setSelDay(null)}
                  style={{width:26,height:26,borderRadius:8,border:`1px solid ${C.border}`,background:"#f5f0e8",color:C.muted,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>
              </div>
            </div>
            {/* 内容 */}
            <div style={{padding:"10px 14px 14px"}}>
              {allItems.length === 0
                ? <div style={{textAlign:"center",color:C.muted,padding:"20px 0",fontSize:13}}>这天暂无活动 ✨</div>
                : <>
                  {evs.map((item,i) =>
                    <ICard key={item.id||i} item={item}
                      onClick={() => { setEditItem(item); setEditType("event"); setForm({title:item.title,date:item.date,time:item.time,endTime:item.endTime,venue:item.venue,city:item.city,group:item.group}); setModal("edit"); }}
                      onEdit={() => { setEditItem(item); setEditType("event"); setForm({title:item.title,date:item.date,time:item.time,endTime:item.endTime,venue:item.venue,city:item.city,group:item.group}); setModal("edit"); }}
                      onDelete={() => deleteItem(item)} />
                  )}
                  {nonEvs.map((item,i) => <ICard key={item.id||i} item={item}
                    onClick={() => { goAnnivDetail({...item, _isBirthday: item._t==="birthday"}, "calendar"); }}
                    onEdit={() => {
                      setEditItem(item);
                      if (item._t==="birthday") { setEditType("birthday"); setForm({name:item.name,birthday:item.birthday,group:item.group}); }
                      else { setEditType("anniversary"); setForm({title:item.title,startDate:item.startDate,repeat:item.repeat,note:item.note}); }
                      setModal("edit");
                    }}
                    onDelete={() => deleteItem(item)} />
                  )}
                </>
              }
            </div>
          </div>
        );
      })()}
      <div style={{height:16}}/>
      </>}

      {/* ── 列表 视图 ── */}
      {page === "list" && (() => {
        const allEvs = [...events].sort((a,b)=>(a.date||"").localeCompare(b.date||"") || (a.time||"").localeCompare(b.time||""));
        if (allEvs.length === 0) return (
          <div style={{width:"100%",maxWidth:480,padding:"60px 20px",textAlign:"center",color:C.muted}}>
            <div style={{fontSize:36,marginBottom:12}}>🎤</div>
            <div>还没有演出记录</div>
            <div style={{fontSize:12,marginTop:6}}>点击上方「＋演出」添加第一场</div>
          </div>
        );
        let lastMonth = "";
        // 预计算每个月的场数
        const monthCount = {};
        allEvs.forEach(ev => {
          const ym = ev.date ? ev.date.slice(0,7) : "未知";
          monthCount[ym] = (monthCount[ym]||0) + 1;
        });
        return (
          <div style={{width:"100%",maxWidth:480,padding:"8px 20px 20px"}}>
            {allEvs.map(ev => {
              const ym = ev.date ? ev.date.slice(0,7) : "未知";
              const showMonth = ym !== lastMonth;
              lastMonth = ym;
              const isPast = ev.date && ev.date < today;
              return (
                <React.Fragment key={ev.id}>
                  {showMonth && (
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 6px"}}>
                      <div style={{fontSize:12,fontWeight:700,color:C.accent,letterSpacing:2}}>
                        {ym.replace("-","年")}月
                      </div>
                      <div style={{fontSize:11,fontWeight:700,color:C.muted}}>共 {monthCount[ym]} 场演出</div>
                    </div>
                  )}
                  <div onClick={()=>{ setEditItem({...ev,_t:"event"}); setEditType("event"); setForm({title:ev.title,date:ev.date,time:ev.time,endTime:ev.endTime,venue:ev.venue,city:ev.city,group:ev.group}); setModal("edit"); }}
                    style={{background:C.card,border:`1px solid ${isPast?C.border:C.accent+"55"}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start"}}>
                    {/* 日期块 */}
                    <div style={{minWidth:44,textAlign:"center",background:isPast?"#e0faf8":"#fce0ea",borderRadius:8,padding:"4px 6px"}}>
                      <div style={{fontSize:18,fontWeight:900,color:isPast?C.teal:C.accent,lineHeight:1}}>
                        {ev.date ? ev.date.slice(8) : "--"}
                      </div>
                      <div style={{fontSize:10,color:C.muted}}>
                        {ev.date ? ["日","一","二","三","四","五","六"][new Date(ev.date).getDay()] : ""}
                      </div>
                    </div>
                    {/* 内容 */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {ev.title || "（无标题）"}
                      </div>
                      <div style={{fontSize:12,color:C.muted,display:"flex",gap:8,flexWrap:"wrap"}}>
                        {ev.time && <span>🕐 {ev.time}{ev.endTime?"～"+ev.endTime:""}</span>}
                        {ev.venue && <span>📍 {ev.venue}</span>}
                      </div>
                      {ev.group && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                          {ev.group.split(",").map(s=>s.trim()).filter(Boolean).map(g=>(
                            <span key={g} style={{background:"#f8eeff",border:"1px solid #c97de844",borderRadius:20,padding:"2px 8px",fontSize:11,color:"#c97de8",fontWeight:700}}>{g}</span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </React.Fragment>
              );
            })}
          </div>
        );
      })()}

      {/* ── 纪念日汇总 视图 ── */}
      {page === "annivs" && (() => {
        const todayD = new Date(today);

        // 计算每个纪念日的「距今天数」和「下一个里程碑」
        // 纪念日：每条纪念日合并为一张卡，多种重复类型在卡内叠排
        const rows = anniversaries.map(a => {
          if (!a.startDate) return null;
          const start = new Date(a.startDate);
          const diffDays = Math.round((todayD - start) / 86400000);
          const isPast = diffDays >= 0;
          const absDays = Math.abs(diffDays);
          const repeats = (a.repeat || "").split(",").filter(Boolean);

          // 无重复模式：只显示累计天数，minDaysToNext=0 让它排在最前
          if (repeats.length === 0) {
            const countdowns = isPast
              ? [{ label:"已经", num:diffDays, unit:"天", daysToNext:0, isToday:diffDays===0 }]
              : [{ label:"还有", num:absDays, unit:"天开始", daysToNext:absDays, isToday:false }];
            const totalDaysLabel = isPast ? `${a.startDate} 起` : `${a.startDate} · 还有${absDays}天开始`;
            return { ...a, _t:"anniversary", countdowns, minDaysToNext:diffDays===0?0:isPast?0:absDays, diffDays, isPast, totalDaysLabel };
          }

          // 计算每种重复类型的倒计时
          const countdowns = repeats.map(repeatType => {
            let label = "", num = 0, unit = "", daysToNext = 0;
            if (repeatType === "yearly") {
              const nextAnniv = new Date(start);
              nextAnniv.setFullYear(todayD.getFullYear());
              if (nextAnniv < todayD) nextAnniv.setFullYear(todayD.getFullYear() + 1);
              daysToNext = Math.round((nextAnniv - todayD) / 86400000);
              const yearsPassed = todayD.getFullYear() - start.getFullYear() - (
                (todayD.getMonth() < start.getMonth() ||
                (todayD.getMonth() === start.getMonth() && todayD.getDate() < start.getDate())) ? 1 : 0
              );
              if (daysToNext === 0) { label="今天是"; num=yearsPassed; unit="周年 🎉"; }
              else if (isPast) { label="还有"; num=daysToNext; unit=`天 · 第${yearsPassed+1}周年`; }
              else { label="还有"; num=absDays; unit="天开始"; }
            } else if (repeatType === "monthly") {
              const monthsPassed = isPast
                ? (todayD.getFullYear()-start.getFullYear())*12 + todayD.getMonth()-start.getMonth()
                : 0;
              const nextDay = new Date(todayD.getFullYear(), todayD.getMonth(), start.getDate());
              if (nextDay <= todayD) nextDay.setMonth(nextDay.getMonth()+1);
              daysToNext = Math.round((nextDay - todayD) / 86400000);
              if (daysToNext === 0) { label="今天是"; num=monthsPassed; unit="个月 🎉"; }
              else { label="还有"; num=daysToNext; unit=isPast?`天 · 第${monthsPassed+1}个月`:"天开始"; }
            } else {
              const next100 = Math.ceil(diffDays / 100) * 100;
              daysToNext = next100 - diffDays;
              if (daysToNext === 0) { label="今天是"; num=diffDays; unit="天 🎉"; }
              else if (isPast) { label="还有"; num=daysToNext; unit=`天 · 第${next100}天`; }
              else { label="还有"; num=absDays; unit="天开始"; }
            }
            return { repeatType, label, num, unit, daysToNext, isToday: daysToNext === 0 };
          }).sort((a, b) => a.daysToNext - b.daysToNext);

          // 卡片排序用最近一个倒计时
          const minDaysToNext = countdowns.length ? countdowns[0].daysToNext : 9999;
          const totalDaysLabel = isPast ? `${a.startDate} 起 · 已 ${diffDays} 天` : `${a.startDate} · 还有 ${absDays} 天开始`;

          return { ...a, _t:"anniversary", countdowns, minDaysToNext, diffDays, isPast, totalDaysLabel };
        }).filter(Boolean);

        // 生日：每年重复，计算下次生日还有几天 + 年龄
        const bdRows = birthdays.map(b => {
          if (!b.birthday) return null;
          const [by, bm, bd] = b.birthday.split("-").map(Number);
          const nextBday = new Date(todayD.getFullYear(), bm-1, bd);
          if (nextBday < todayD) nextBday.setFullYear(todayD.getFullYear()+1);
          const daysToNext = Math.round((nextBday - todayD) / 86400000);
          const age = todayD.getFullYear() - by - (
            (todayD.getMonth()+1 < bm || (todayD.getMonth()+1 === bm && todayD.getDate() < bd)) ? 1 : 0
          );
          const isToday = daysToNext === 0;
          const countdowns = [{
            repeatType: "yearly",
            label: isToday ? "今天" : "还有",
            num: isToday ? age+1 : daysToNext,
            unit: isToday ? `岁生日 🎂` : `天 · ${age+1}岁生日`,
            daysToNext,
            isToday,
          }];
          const totalDaysLabel = `${b.birthday} · 现在${age}岁`;
          return {
            ...b, _isBirthday:true, _t:"birthday",
            countdowns, minDaysToNext: daysToNext,
            diffDays: -daysToNext,
            isPast: false, totalDaysLabel,
            title: b.name,
          };
        }).filter(Boolean);

        // 合并：生日 + 纪念日，按下次到来天数排序
        const allRows = [...rows, ...bdRows];
        const future = allRows.filter(r => r.minDaysToNext === 0 || r.diffDays <= 0).sort((a,b) => a.minDaysToNext - b.minDaysToNext);
        const upcoming = allRows.filter(r => r.minDaysToNext > 0 && r.diffDays > 0).sort((a,b) => a.minDaysToNext - b.minDaysToNext);
        const sorted = [...future, ...upcoming];

        if (sorted.length === 0) return (
          <div style={{width:"100%",maxWidth:480,padding:"60px 20px",textAlign:"center",color:C.muted}}>
            <div style={{fontSize:36,marginBottom:12}}>💫</div>
            <div>还没有纪念日或生日</div>
            <div style={{fontSize:12,marginTop:6}}>点击上方「＋纪念日」或「＋生日」添加</div>
          </div>
        );

        return (
          <div style={{width:"100%",maxWidth:480,padding:"8px 20px 20px"}}>
            {sorted.map(r => {
              const anyToday = r.countdowns.some(c => c.isToday);
              const accentColor = anyToday ? C.accent : r._isBirthday ? C.gold : C.teal;
              const typeLabel = r._isBirthday
                ? `🎂 生日${r.group ? " · "+r.group : ""}`
                : `💫 纪念日 · ${r.startDate}`;

              return (
                <div key={r.id} onClick={()=>goAnnivDetail(r)}
                  style={{display:"flex",alignItems:"stretch",background:"#fff",borderRadius:16,marginBottom:10,overflow:"hidden",boxShadow:"0 3px 0 0 #e8e0d0",border:`2px solid ${anyToday?C.accent:C.border}`,cursor:"pointer"}}>
                  {/* 左侧色条 */}
                  <div style={{width:5,background:accentColor,flexShrink:0}} />

                  {/* 内容区 */}
                  <div style={{flex:1,padding:"12px 10px 12px 14px",minWidth:0}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:3,letterSpacing:.5,fontWeight:700}}>{typeLabel}</div>
                    <div style={{fontSize:15,fontWeight:800,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</div>
                    {r.note && <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{r.note}</div>}
                    <div style={{fontSize:11,color:C.muted,marginTop:4}}>{r.totalDaysLabel}</div>

                    {/* 多个倒计时叠排 */}
                    <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:8}}>
                      {r.countdowns.map((c,ci) => {
                        const cColor = c.isToday ? C.accent : r._isBirthday ? C.gold : C.teal;
                        const bg = c.isToday ? "#fff0f8" : r._isBirthday ? "#fffaee" : "#edfcfb";
                        return (
                          <div key={ci} style={{display:"flex",alignItems:"center",gap:6,background:bg,borderRadius:8,padding:"5px 10px"}}>
                            <span style={{fontSize:10,color:cColor,fontWeight:800,whiteSpace:"nowrap"}}>{c.label}</span>
                            <span style={{fontSize:20,fontWeight:900,color:cColor,lineHeight:1}}>{c.num}</span>
                            <span style={{fontSize:11,color:cColor,fontWeight:700,lineHeight:1.3}}>{c.unit}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 右侧箭头提示可点击 */}
                  <div style={{display:"flex",alignItems:"center",paddingRight:12,color:C.muted}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>

                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ═══ ANNIV DETAIL PAGE ═══ */}
      {page === "anniv-detail" && selAnniv && (
        <AnnivDetailPage
          selAnniv={selAnniv}
          birthdays={birthdays}
          anniversaries={anniversaries}
          navigate={navigate}
          setEditItem={setEditItem}
          setEditType={setEditType}
          setForm={setForm}
          setModal={setModal}
          setBirthdays={setBirthdays}
          setAnnivs={setAnnivs}
        />
      )}

      {/* ═══ MODALS ═══ */}
      {modal && (
        <div style={{ position:"fixed", inset:0, background:"#1a3a3888", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}
          onClick={e => { if(e.target===e.currentTarget) closeModal(); }}>
          <div style={{ background:"#faf7f2", backgroundImage:"linear-gradient(rgba(160,140,100,0.05) 1px, transparent 1px),linear-gradient(90deg,rgba(94,206,200,0.07) 1px,transparent 1px)", backgroundSize:"28px 28px", borderRadius:"20px 20px 0 0", width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto", padding:"24px 20px 48px", border:`2px solid ${C.border}`, borderBottom:"none", boxShadow:"0 -4px 0 0 #b8eeeb" }}>

            {/* ── ADD EVENT (weibo) ── */}
            {(modal==="add-event" || modal==="add-birthday") && (() => {
              const isEv = modal==="add-event";
              const hasParsed = parsed?._type === (isEv?"event":"birthday");
              return (<>
                <MHead title={isEv?"添加演出":"添加生日"} onClose={closeModal} />

              const allYears = [...new Set(events.map(e => e.date?.slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);
              const filtered = statsYear === "all" ? events : events.filter(e => e.date?.startsWith(statsYear));

                if(e.city) ci[e.city]=(ci[e.city]||0)+1;
                if(e.venue) ve[e.venue]=(ve[e.venue]||0)+1;

              });

              const topCity  = Object.entries(ci).sort((a,b)=>b[1]-a[1])[0];
              const topVenue = Object.entries(ve).sort((a,b)=>b[1]-a[1])[0];

              const titleStr = statsYear === "all" ? "全部时间" : `${statsYear}年`;

                  const s2 = document.createElement("script");
                  s2.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                  s2.onload = () => window.html2canvas(node, { backgroundColor:"#faf7f2", scale:2, useCORS:true, logging:false }).then(doExport);

                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{width:20,height:20,borderRadius:6,background:rank===0?"linear-gradient(135deg,#f0a830,#e8886a)":"#f0ece4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" y1="2" x2="12" y2="15"/>
                      </svg>
                    </button>
                    {/* 关闭按钮 */}
                    <button onClick={closeModal} style={{width:36,height:36,borderRadius:10,background:"#fff8ee",border:"2px solid #f0a830",color:"#f0a830",fontSize:16,cursor:"pointer",fontWeight:900}}>✕</button>

                      style={{padding:"5px 12px",borderRadius:20,border:`2px solid ${statsYear===y?(y==="all"?C.teal:C.accent):C.border}`,background:statsYear===y?(y==="all"?"#edfcfb":"#fff0f8"):"#fff",color:statsYear===y?(y==="all"?C.teal:C.accent):C.muted,fontSize:12,fontWeight:800,cursor:"pointer"}}>

                  ))}

                {/* 导出卡片区域 */}
                <div id="stats-export-card" style={{background:"#faf7f2",borderRadius:16,padding:"0 2px 4px"}}>

                  {s.total === 0
                    ? <div style={{textAlign:"center",color:C.muted,padding:"40px 0"}}>暂无演出记录 ✨</div>
                    : (<>

                    {/* Hero：三个大数字 */}
                    <div style={{background:"linear-gradient(135deg,#ff6bab 0%,#c97de8 100%)",borderRadius:16,padding:"20px 20px 18px",marginBottom:14,boxShadow:"0 4px 0 0 #c0306044"}}>

                        <div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",fontWeight:700,letterSpacing:1,marginBottom:2}}>最常去城市</div>
                          <div style={{fontSize:15,fontWeight:900,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topCity?topCity[0]:"—"}</div>

                          <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",fontWeight:700,letterSpacing:1,marginBottom:2}}>最常去场馆</div>

                    {(() => {

                      if (statsYear === "all") return null;
                      const maxM = Math.max(...Object.values(monthlyMap));

                      // 特定年份：固定1-12月；全部：取所有出现的年份分组
                      const displayMonths = statsYear !== "all"
                        ? Array.from({length:12},(_,i)=>{
                            const k = `${statsYear}-${String(i+1).padStart(2,"0")}`;
                            return [k, monthlyMap[k]||0, i+1];
                          })
                        : Array.from({length:12},(_,i)=>{
                            const k = `${statsYear !== "all" ? statsYear : new Date().getFullYear()}-${String(i+1).padStart(2,"0")}`;
                            return [k, monthlyMap[k]||0, i+1];
                          });

                      // 全部模式下按年份分组显示
                      if (statsYear === "all") {
                        const years = [...new Set(Object.keys(monthlyMap).map(k=>k.slice(0,4)))].sort();
                        return (
                          <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,border:`2px solid ${C.border}`,boxShadow:`0 3px 0 0 ${C.border}`}}>
                            <div style={{fontSize:11,color:C.teal,fontWeight:900,letterSpacing:1,marginBottom:10}}>📅 每月场次</div>
                            {years.map(yr => {
                              const yrMax = Math.max(...Array.from({length:12},(_,i)=>monthlyMap[`${yr}-${String(i+1).padStart(2,"0")}`]||0), 1);
                              return (
                                <div key={yr} style={{marginBottom:12}}>
                                  <div style={{fontSize:11,color:C.muted,fontWeight:800,marginBottom:6}}>{yr}年</div>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                                    {Array.from({length:12},(_,i)=>{
                                      const k = `${yr}-${String(i+1).padStart(2,"0")}`;
                                      const n = monthlyMap[k]||0;
                                      const isTop = n === yrMax && n > 0;
                                      const pct = n/yrMax;
                                      const bg = n === 0 ? "#f5f0e8"
                                        : isTop ? "linear-gradient(135deg,#ff6bab,#c97de8)"
                                        : pct > 0.6 ? "#ffd6ea" : pct > 0.3 ? "#ffe8f2" : "#fff0f7";
                                      return (
                                        <div key={k} style={{borderRadius:10,padding:"8px 6px",background:bg,textAlign:"center",border:`1.5px solid ${n===0?"#f0ece4":isTop?"#ff6bab44":"#ffb8d844"}`}}>
                                          <div style={{fontSize:11,fontWeight:700,color:n===0?C.muted:isTop?"#fff":C.text}}>{i+1}月</div>
                                          <div style={{fontSize:18,fontWeight:900,color:n===0?C.muted:isTop?"#fff":C.accent,lineHeight:1.2}}>{n===0?"—":n}</div>
                                          {n>0&&<div style={{fontSize:9,color:isTop?"rgba(255,255,255,0.8)":C.muted,marginTop:1}}>场</div>}
                                        </div>
                                      );
                                    })}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      }

                      // 特定年份：单个4×3格子
                      return (
                        <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,border:`2px solid ${C.border}`,boxShadow:`0 3px 0 0 ${C.border}`}}>
                          <div style={{fontSize:11,color:C.teal,fontWeight:900,letterSpacing:1,marginBottom:10}}>📅 每月场次</div>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                            {displayMonths.map(([ym, n, m]) => {
                              const isTop = n === maxM && n > 0;
                              const pct = maxM > 0 ? n/maxM : 0;
                              const bg = n === 0 ? "#f5f0e8"
                                : isTop ? "linear-gradient(135deg,#ff6bab,#c97de8)"
                                : pct > 0.6 ? "#ffd6ea" : pct > 0.3 ? "#ffe8f2" : "#fff0f7";
                              return (
                                <div key={ym} style={{borderRadius:10,padding:"8px 6px",background:bg,textAlign:"center",border:`1.5px solid ${n===0?"#f0ece4":isTop?"#ff6bab44":"#ffb8d844"}`}}>
                                  <div style={{fontSize:11,fontWeight:700,color:n===0?C.muted:isTop?"#fff":C.text}}>{m}月</div>
                                  <div style={{fontSize:n===0?14:22,fontWeight:900,color:n===0?C.muted:isTop?"#fff":C.accent,lineHeight:1.2}}>{n===0?"—":n}</div>
                                  {n>0&&<div style={{fontSize:9,color:isTop?"rgba(255,255,255,0.8)":C.muted,marginTop:1}}>场</div>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })()}

                    {/* 城市分布 */}
                    {Object.entries(ci).length > 0 && (
                      <CollapsibleBarCard
                        title="📍 城市"
                        entries={Object.entries(ci)}
                        barColorFn={i=>i===0?"linear-gradient(90deg,#ff6bab,#f0a830)":"linear-gradient(90deg,#f0a83066,#f0c88066)"}
                        textColor={C.coral}
                      />
                    )}

                    {/* 场馆分布 */}
                    {Object.entries(ve).length > 0 && (
                      <CollapsibleBarCard
                        title="🏟️ 场馆"
                        entries={Object.entries(ve)}
                        barColorFn={i=>i===0?"linear-gradient(90deg,#5ecec8,#b8eeeb)":"linear-gradient(90deg,#5ecec833,#b8eeeb44)"}
                        textColor={C.teal}
                      />
                    )}

                    {/* 团体分布 */}
                    {Object.entries(gr).length > 0 && (
                      <CollapsibleBarCard
                        title="🎤 团体"
                        entries={Object.entries(gr)}
                        barColorFn={i=>i===0?"linear-gradient(90deg,#c97de8,#ff6bab)":"linear-gradient(90deg,#c97de833,#ff6bab22)"}
                        textColor="#c97de8"
                      />
                    )}

                    {/* 页脚水印 */}
                    <div style={{textAlign:"center",paddingTop:4,paddingBottom:2}}>
                      <span style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:2}}>✦ LiveLog · 地下偶像演出日历 ✦</span>
                    </div>
                  </>)}
                </div>
              </>);
            })()}

            {/* ── 重复确认 ── */}
            {modal==="dup-confirm" && dupTarget && (<>
              <MHead title="检测到重复" onClose={closeModal} />
              <div style={{background:"#fffaee",border:"2px solid #f0a830",borderRadius:10,padding:"14px",marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:6}}>已有相同的记录：</div>
                <div style={{fontSize:13,color:C.text,marginBottom:2}}>{dupTarget.title || dupTarget.name || "（无标题）"}</div>
                <div style={{fontSize:12,color:C.muted}}>{dupTarget.date || dupTarget.birthday} {dupTarget.venue || dupTarget.group || ""}</div>
              </div>
              <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>
                是否用新识别的内容<strong style={{color:C.text}}>覆盖</strong>原有记录？
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={() => {
                  // 覆盖：用新 form 替换已有记录
                  if (dupTarget.birthday !== undefined) {
                    setBirthdays(p => p.map(b => b.id===dupTarget.id ? {...b,...form} : b));
                  } else {
                    setEvents(p => p.map(e => e.id===dupTarget.id ? {...e,...form} : e));
                  }
                  setDupTarget(null);
                  closeModal();
                }} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,#e8537a,#c0386a)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                  覆盖原有记录
                </button>
                <button onClick={() => {
                  // 强制新增（不去重）
                  if (dupTarget.birthday !== undefined) {
                    setBirthdays(p => [...p, { id: Date.now(), ...form }]);
                  } else {
                    setEvents(p => [...p, { id: Date.now(), ...form }]);
                  }
                  setDupTarget(null);
                  closeModal();
                }} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:14,cursor:"pointer"}}>
                  仍然新增
                </button>
              </div>
            </>)}

            {/* ── 导入成功 ── */}
            {modal==="import-done" && (<>
              <MHead title="恢复完成" onClose={closeModal} />
              <div style={{textAlign:"center",padding:"24px 0 16px"}}>
                <div style={{fontSize:48,marginBottom:12}}>✅</div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>数据恢复成功</div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.8}}>
                  演出 <strong style={{color:C.coral}}>{importCount.events}</strong> 条 ·
                  生日 <strong style={{color:C.gold}}>{importCount.birthdays}</strong> 条 ·
                  纪念日 <strong style={{color:C.teal}}>{importCount.anniversaries}</strong> 条
                </div>
                <div style={{fontSize:12,color:C.muted,marginTop:8}}>已有记录不受影响</div>
              </div>
              <SBtn onClick={closeModal} label="好的" />
            </>)}

          </div>
        </div>
      )}

      <BottomNav page={page} navigate={navigate} prevPage={selAnniv?._prevPage} />
    </div>
  );
}

// ── Sub components ──
function MHead({ title, onClose }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:900,color:C.text,fontFamily:"'Nunito','PingFang SC',sans-serif"}}>{title}</div>
      <button onClick={onClose} style={{background:"#fff8ee",border:"2px solid #f0a830",color:"#f0a830",fontSize:16,cursor:"pointer",width:32,height:32,borderRadius:8,fontWeight:900,lineHeight:1}}>✕</button>
    </div>
  );
}

function AnnivDetailPage({ selAnniv, birthdays, anniversaries, navigate, setEditItem, setEditType, setForm, setModal, setBirthdays, setAnnivs }) {
  const todayD = new Date(); todayD.setHours(0,0,0,0);

  // ── null guard 必须在所有 hook 之前 ──
  const isBd = selAnniv?._isBirthday;
  const raw = isBd
    ? birthdays.find(b => b.id === selAnniv?.id)
    : anniversaries.find(a => a.id === selAnniv?.id);

  const imgKey = `ic_anniv_img_${raw?.id || "none"}`;
  const modeKey = `ic_anniv_mode_${raw?.id || "none"}`;
  const [heroImg, setHeroImg] = useState(() => {
    try { return localStorage.getItem(imgKey) || null; } catch { return null; }
  });
  const [displayMode, setDisplayMode] = useState(() => {
    try { return localStorage.getItem(modeKey) || "countdown"; } catch { return "countdown"; }
  });
  const switchMode = (m) => { setDisplayMode(m); try { localStorage.setItem(modeKey, m); } catch {} };

  // selAnniv 或 raw 消失时安全退出
  if (!selAnniv || !raw) return null;

  const handleImgUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { localStorage.setItem(imgKey, ev.target.result); setHeroImg(ev.target.result); };
    reader.readAsDataURL(file);
  };
  const removeImg = () => { localStorage.removeItem(imgKey); setHeroImg(null); };

  // 计算倒计时
  let countdowns, totalDaysLabel, diffDays, isPast, absDays;
  if (isBd) {
    const [by, bm, bd] = raw.birthday.split("-").map(Number);
    const nextBday = new Date(todayD.getFullYear(), bm-1, bd);
    if (nextBday < todayD) nextBday.setFullYear(todayD.getFullYear()+1);
    const daysToNext = Math.round((nextBday - todayD) / 86400000);
    const age = todayD.getFullYear() - by - ((todayD.getMonth()+1 < bm || (todayD.getMonth()+1===bm && todayD.getDate()<bd))?1:0);
    const isToday = daysToNext === 0;
    countdowns = [{ label: isToday?"今天":"还有", num: isToday?age+1:daysToNext, unit: isToday?`岁生日 🎂`:`天 · ${age+1}岁生日`, daysToNext, isToday }];
    totalDaysLabel = `${raw.birthday} · 现在${age}岁`;
    diffDays = -daysToNext; isPast = false; absDays = daysToNext;
  } else {
    const start = new Date(raw.startDate);
    diffDays = Math.round((todayD - start) / 86400000);
    isPast = diffDays >= 0; absDays = Math.abs(diffDays);
    const repeats = (raw.repeat||"").split(",").filter(Boolean);
    if (repeats.length === 0) {
      countdowns = isPast
        ? [{ label:"已经", num:diffDays, unit:"天", daysToNext:0, isToday:diffDays===0 }]
        : [{ label:"还有", num:absDays, unit:"天开始", daysToNext:absDays, isToday:false }];
    } else {
      countdowns = repeats.map(rt => {
        let label="", num=0, unit="", daysToNext=0;
        if (rt==="yearly") {
          const nx = new Date(start); nx.setFullYear(todayD.getFullYear());
          if (nx < todayD) nx.setFullYear(todayD.getFullYear()+1);
          daysToNext = Math.round((nx-todayD)/86400000);
          const yrs = todayD.getFullYear()-start.getFullYear()-((todayD.getMonth()<start.getMonth()||(todayD.getMonth()===start.getMonth()&&todayD.getDate()<start.getDate()))?1:0);
          if(daysToNext===0){label="今天是";num=yrs;unit="周年 🎉";}
          else if(isPast){label="还有";num=daysToNext;unit=`天 · 第${yrs+1}周年`;}
          else{label="还有";num=absDays;unit="天开始";}
        } else if (rt==="monthly") {
          const mo = isPast?(todayD.getFullYear()-start.getFullYear())*12+todayD.getMonth()-start.getMonth():0;
          const nx = new Date(todayD.getFullYear(),todayD.getMonth(),start.getDate());
          if (nx<=todayD) nx.setMonth(nx.getMonth()+1);
          daysToNext = Math.round((nx-todayD)/86400000);
          if(daysToNext===0){label="今天是";num=mo;unit="个月 🎉";}
          else{label="还有";num=daysToNext;unit=isPast?`天 · 第${mo+1}个月`:"天开始";}
        } else {
          const n100 = Math.ceil(diffDays/100)*100;
          daysToNext = n100-diffDays;
          if(daysToNext===0){label="今天是";num=diffDays;unit="天 🎉";}
          else if(isPast){label="还有";num=daysToNext;unit=`天 · 第${n100}天`;}
          else{label="还有";num=absDays;unit="天开始";}
        }
        return { rt, label, num, unit, daysToNext, isToday: daysToNext===0 };
      }).sort((a,b)=>a.daysToNext-b.daysToNext);
    }
    totalDaysLabel = isPast ? `${raw.startDate} 起 · 已 ${diffDays} 天` : `${raw.startDate} · 还有 ${absDays} 天开始`;
  }

  const anyToday = countdowns.some(c => c.isToday);
  const accentColor = anyToday ? C.accent : isBd ? C.gold : C.teal;
  const displayTitle = isBd ? raw.name : raw.title;
  const typeLabel = isBd ? "🎂 生日" : "💫 纪念日";
  const hero = countdowns[0];

  // 「已陪伴」模式数据
  const accompaniedDays = isBd
    ? (() => { const [by,bm,bd]=raw.birthday.split("-").map(Number); return Math.round((todayD-new Date(by,bm-1,bd))/86400000); })()
    : diffDays;
  const accompaniedHero = {
    label: accompaniedDays < 0 ? "还有" : accompaniedDays === 0 ? "今天是" : "已经",
    num: Math.abs(accompaniedDays),
    unit: accompaniedDays < 0 ? "天后" : accompaniedDays === 0 ? "第一天 🎉" : "天",
  };
  const activeHero = displayMode === "accompanied" ? accompaniedHero : hero;

  // 更亮的渐变占位色
  const gradientBg = isBd
    ? `linear-gradient(160deg, #ffe8f4 0%, #ffd6a0 100%)`
    : `linear-gradient(160deg, #d4f5f3 0%, #e8d6f8 100%)`;

  return (
    <div style={{width:"100%",maxWidth:480,paddingBottom:40}}>

      {/* ── 封面英雄区 ── */}
      <div style={{padding:"12px 16px 0"}}>
      <div style={{position:"relative",width:"100%",height:"58vw",maxHeight:300,overflow:"hidden",borderRadius:24}}>
        {heroImg
          ? <img src={heroImg} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}} />
          : <div style={{position:"absolute",inset:0,background:gradientBg}} />
        }
        {/* 蒙版：有图时加深，无图时加轻蒙版保证白字可读 */}
        <div style={{position:"absolute",inset:0,background:heroImg
          ?"linear-gradient(to top,rgba(0,0,0,0.72) 0%,rgba(0,0,0,0.18) 60%,rgba(0,0,0,0.08) 100%)"
          :"rgba(0,0,0,0.12)"}} />

        {/* 大字倒计时 — 居中 */}
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:2,padding:"0 20px",textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:800,letterSpacing:1,marginBottom:6,color:"rgba(255,255,255,0.92)",textShadow:"0 1px 6px rgba(0,0,0,0.35)"}}>
            {displayTitle}
          </div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:2,color:"rgba(255,255,255,0.75)",textShadow:"0 1px 4px rgba(0,0,0,0.3)"}}>
            {activeHero.label}
          </div>
          <div style={{fontSize:"min(22vw,108px)",fontWeight:900,lineHeight:0.9,letterSpacing:-2,color:"#fff",textShadow:"0 4px 24px rgba(0,0,0,0.25)"}}>
            {activeHero.num}
          </div>
          <div style={{fontSize:13,fontWeight:700,marginTop:8,lineHeight:1.4,color:"rgba(255,255,255,0.88)",textShadow:"0 1px 6px rgba(0,0,0,0.3)"}}>
            {activeHero.unit}
          </div>
          {/* 切换胶囊 */}
          <div style={{marginTop:14,display:"inline-flex",background:"rgba(0,0,0,0.28)",backdropFilter:"blur(8px)",borderRadius:20,padding:3,gap:2}}>
            {[["countdown","倒计时"],["accompanied","已经"]].map(([mode,label])=>(
              <button key={mode} onClick={()=>switchMode(mode)}
                style={{padding:"4px 14px",borderRadius:16,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,transition:"all .15s",
                  background: displayMode===mode ? "rgba(255,255,255,0.92)" : "transparent",
                  color: displayMode===mode ? "#333" : "rgba(255,255,255,0.75)"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* 上传图片按钮 */}
        <div style={{position:"absolute",bottom:12,right:14,zIndex:3,display:"flex",gap:6}}>
          {heroImg && <button onClick={removeImg} style={{background:"rgba(0,0,0,0.30)",backdropFilter:"blur(8px)",border:"none",borderRadius:20,padding:"5px 11px",color:"rgba(255,255,255,0.75)",fontSize:11,fontWeight:700,cursor:"pointer"}}>移除</button>}
          <label style={{cursor:"pointer"}}>
            <input type="file" accept="image/*" onChange={handleImgUpload} style={{display:"none"}} />
            <div style={{background:"rgba(0,0,0,0.30)",backdropFilter:"blur(8px)",borderRadius:20,padding:"5px 11px",display:"flex",alignItems:"center",gap:5,color:"rgba(255,255,255,0.9)",fontSize:11,fontWeight:700}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              {heroImg?"换图":"上传图片"}
            </div>
          </label>
        </div>
      </div>
      </div>

      {/* ── 标题信息区 ── */}
      <div style={{padding:"18px 20px 8px"}}>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:1,marginBottom:4}}>{typeLabel}{isBd&&raw.group?" · "+raw.group:""}</div>
        <div style={{fontSize:24,fontWeight:900,color:C.text,marginBottom:4}}>{displayTitle}</div>
        <div style={{fontSize:12,color:C.muted}}>{totalDaysLabel}</div>
        {raw.note && <div style={{marginTop:10,padding:"10px 14px",background:"#f5f0e8",borderRadius:10,fontSize:13,color:C.muted,lineHeight:1.6}}>📝 {raw.note}</div>}
      </div>

      {/* ── 倒计时卡片（多个时显示）── */}
      {countdowns.length > 1 && (
        <div style={{padding:"4px 20px 8px"}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:1,marginBottom:8}}>所有倒计时</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {countdowns.map((c,ci) => {
              const cColor = c.isToday ? C.accent : isBd ? C.gold : C.teal;
              const bg = c.isToday ? "#fff0f8" : isBd ? "#fffaee" : "#edfcfb";
              return (
                <div key={ci} style={{background:bg,borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,border:`2px solid ${cColor}33`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:cColor,fontWeight:800,letterSpacing:1,marginBottom:2}}>{c.label}</div>
                    <div style={{fontSize:36,fontWeight:900,color:cColor,lineHeight:1}}>{c.num}</div>
                  </div>
                  <div style={{fontSize:13,color:cColor,fontWeight:700,textAlign:"right",lineHeight:1.6}}>{c.unit}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 编辑 + 删除 ── */}
      <div style={{padding:"16px 20px 0",display:"flex",flexDirection:"column",gap:10}}>
        <button onClick={()=>{
          if (isBd) { setEditItem({...raw,_t:"birthday"}); setEditType("birthday"); setForm({name:raw.name,birthday:raw.birthday,group:raw.group||""}); }
          else { setEditItem({...raw,_t:"anniversary"}); setEditType("anniversary"); setForm({title:raw.title,startDate:raw.startDate,repeat:raw.repeat||"",note:raw.note||""}); }
          setModal("edit");
        }} style={{width:"100%",padding:14,borderRadius:14,border:"2px solid #f0a830",background:"#fff8ee",color:"#f0a830",fontSize:14,fontWeight:800,cursor:"pointer"}}>
          ✎ 编辑
        </button>
        <button onClick={()=>{
          if (isBd) setBirthdays(p=>p.filter(b=>b.id!==raw.id));
          else setAnnivs(p=>p.filter(a=>a.id!==raw.id));
          navigate("annivs");
        }} style={{width:"100%",padding:14,borderRadius:14,border:"2px solid #ff6b6b",background:"#fff2f2",color:"#e03030",fontSize:14,fontWeight:800,cursor:"pointer"}}>
          ✕ 删除这条{isBd?"生日":"纪念日"}
        </button>
      </div>

    </div>
  );
}

function YMPicker({ year, month, setYear, setMonth, setSelDay, prev, next }) {
  const [open, setOpen] = useState(false);
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
      {/* 翻页 ‹ */}
      <button onClick={prev} style={{background:"#fff",border:`2px solid ${C.teal}`,color:C.teal,borderRadius:10,width:32,height:32,fontSize:18,cursor:"pointer",fontWeight:900,boxShadow:`0 3px 0 0 ${C.teal}44`,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      {/* 年月大字（纯文字，不可点击） */}
      <span style={{fontSize:26,fontWeight:900,color:C.text,fontFamily:"'Nunito','PingFang SC',sans-serif"}}>{year}年{month+1}月</span>
      {/* 翻页 › */}
      <button onClick={next} style={{background:"#fff",border:`2px solid ${C.teal}`,color:C.teal,borderRadius:10,width:32,height:32,fontSize:18,cursor:"pointer",fontWeight:900,boxShadow:`0 3px 0 0 ${C.teal}44`,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      {/* ˅ 弹出选择按钮 */}
      <span style={{position:"relative"}}>
        <button onClick={()=>setOpen(v=>!v)}
          style={{background:"#fff",border:`2px solid ${C.teal}`,color:C.teal,borderRadius:10,width:32,height:32,cursor:"pointer",fontWeight:900,boxShadow:`0 3px 0 0 ${C.teal}44`,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.teal} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        {open && (
          <>
            <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:199}} />
            <div style={{position:"absolute",right:0,top:40,zIndex:200,background:"#fff",border:`2px solid ${C.border}`,borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.13)",padding:16,minWidth:260}}>
              {/* 年份行 */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <button onClick={()=>setYear(y=>y-1)} style={{width:28,height:28,border:`1px solid ${C.border}`,borderRadius:8,background:"#f5f0e8",cursor:"pointer",fontSize:15,color:C.teal,fontWeight:900}}>‹</button>
                <span style={{fontSize:15,fontWeight:900,color:C.text}}>{year}年</span>
                <button onClick={()=>setYear(y=>y+1)} style={{width:28,height:28,border:`1px solid ${C.border}`,borderRadius:8,background:"#f5f0e8",cursor:"pointer",fontSize:15,color:C.teal,fontWeight:900}}>›</button>
              </div>
              {/* 月份 4×3 格子 */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {Array.from({length:12},(_,i)=>i).map(m=>{
                  const isCur = m===month;
                  return (
                    <button key={m} onClick={()=>{setMonth(m);setSelDay(null);setOpen(false);}}
                      style={{padding:"7px 0",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:800,
                        background:isCur?"linear-gradient(135deg,#ff6bab,#e03888)":"#f5f0e8",
                        color:isCur?"#fff":C.text,
                        boxShadow:isCur?"0 2px 0 0 #c0306055":"none"}}>
                      {m+1}月
                    </button>
                  );
                })}
              </div>
            </div>
          </>
        )}
      </span>
    </span>
  );
}

function FF({ label, value, onChange, type="text" }) {
  return (
    <div style={{marginBottom:10}}>
      <label style={{fontSize:11,color:C.teal,display:"block",marginBottom:3,fontWeight:900,letterSpacing:.5}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",background:"#fff",border:`2px solid ${C.border}`,color:C.text,borderRadius:8,padding:"8px 10px",fontSize:13,boxSizing:"border-box",outline:"none",fontWeight:700,WebkitAppearance:"none",appearance:"none",display:"block"}} />
    </div>
  );
}

function SBtn({ onClick, label="保存" }) {
  return (
    <button onClick={onClick} style={{width:"100%",padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,#ff6bab,#e03888)",color:"#fff",fontSize:15,fontWeight:900,cursor:"pointer",marginTop:8,boxShadow:"0 4px 0 0 #c0306055"}}>{label}</button>
  );
}

function GroupPicker({ value, onChange, myGroups }) {
  const selected = value ? value.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const [inputVal, setInputVal] = useState("");
  const toggle = (g) => {
    const next = selected.includes(g) ? selected.filter(x=>x!==g) : [...selected, g];
    onChange(next.join(","));
  };
  const addCustom = () => {
    const v = inputVal.trim();
    if (!v) return;
    if (!selected.includes(v)) onChange([...selected, v].join(","));
    setInputVal("");
  };
  return (
    <div style={{marginBottom:12}}>
      <label style={{fontSize:11,color:C.teal,display:"block",marginBottom:6,fontWeight:900,letterSpacing:.5}}>演出团体</label>
      {myGroups.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {myGroups.map(g => (
            <button key={g} onClick={()=>toggle(g)}
              style={{padding:"4px 10px",borderRadius:20,border:`2px solid ${selected.includes(g)?C.accent:C.border}`,background:selected.includes(g)?"#ffe0ee":"#fff",color:selected.includes(g)?C.accent:C.text,fontSize:12,cursor:"pointer",fontWeight:800}}>
              {selected.includes(g) ? "✓ " : ""}{g}
            </button>
          ))}
        </div>
      )}
      {selected.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
          {selected.map(g => (
            <span key={g} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#ffe0ee",border:"2px solid #c97de8",borderRadius:20,padding:"3px 10px",fontSize:12,color:"#c97de8",fontWeight:800}}>
              {g}<span onClick={()=>toggle(g)} style={{cursor:"pointer",fontSize:14,lineHeight:1}}>×</span>
            </span>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:6}}>
        <input value={inputVal} onChange={e=>setInputVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addCustom()}
          placeholder={myGroups.length?"输入其他团体名…":"输入团体名，回车添加"}
          style={{flex:1,background:"#fff",border:`2px solid ${C.border}`,color:C.text,borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none",fontWeight:700}} />
        <button onClick={addCustom} disabled={!inputVal.trim()}
          style={{padding:"7px 12px",borderRadius:8,border:"none",background:inputVal.trim()?"linear-gradient(135deg,#ff6bab,#e03888)":"#e0faf8",color:inputVal.trim()?"#fff":C.teal,fontSize:12,fontWeight:900,cursor:inputVal.trim()?"pointer":"default"}}>
          添加
        </button>
      </div>
    </div>
  );
}

function ICard({ item, onEdit, onDelete, onClick }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const cfg = {
    event:       {bg:"#fff0f8", border:"#ff6bab", color:"#cc3080"},
    birthday:    {bg:"#fffaee", border:"#f0a830", color:"#b07800"},
    anniversary: {bg:"#edfcfb", border:"#5ecec8", color:"#1a8a84"},
  }[item._t] || {};
  let title = "", sub = "";
  if (item._t==="event") {
    title = item.title;
    sub = [item.time, item.venue, item.city].filter(Boolean).join(" · ");
  }
  else if (item._t==="birthday") { title=`🎂 ${item.name} 生日`; sub=item.group||""; }
  else {
    title = item.title;
    sub = item._years != null ? `第${item._years}周年 ✨`
        : item._months != null ? `第${item._months}个月 ✨`
        : item._days != null ? `第${item._days}天 ✨`
        : item.startDate ? `💫 ${item.startDate} 起` : "纪念日";
  }
  const groups = item.group ? item.group.split(",").map(s=>s.trim()).filter(Boolean) : [];
  return (
    <div onClick={onClick} style={{position:"relative",background:cfg.bg,border:`2px solid ${cfg.border}`,borderRadius:12,padding:"10px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start",boxShadow:`0 3px 0 0 ${cfg.border}66`,cursor:onClick?"pointer":"default"}}>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:900,color:cfg.color}}>{title}</div>
        {sub && <div style={{fontSize:12,color:C.muted,marginTop:2,fontWeight:700}}>{sub}</div>}
        {item._t==="event" && groups.length > 0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
            {groups.map(g=>(
              <span key={g} style={{background:"#f8eeff",border:"2px solid #c97de844",borderRadius:20,padding:"2px 8px",fontSize:11,color:"#c97de8",fontWeight:800}}>{g}</span>
            ))}
          </div>
        )}
      </div>
      <div style={{position:"relative",marginLeft:8,flexShrink:0}}>
        <button onClick={e=>{e.stopPropagation();setMenuOpen(v=>!v);}}
          style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,width:28,height:28,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,lineHeight:1,letterSpacing:1}}>
          ⋯
        </button>
        {menuOpen && (
          <>
            <div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,zIndex:99}} />
            <div style={{position:"absolute",right:0,top:32,zIndex:100,background:"#fff",border:`2px solid ${C.border}`,borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",overflow:"hidden",minWidth:100}}>
              <button onClick={()=>{setMenuOpen(false);onEdit();}}
                style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"11px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:800,color:"#f0a830",borderBottom:`1px solid ${C.border}`}}>
                ✎ 编辑
              </button>
              <button onClick={()=>{setMenuOpen(false);onDelete();}}
                style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"11px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:800,color:"#e03030"}}>
                ✕ 删除
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function SC({ label, value, unit="", color, wide }) {
  return (
    <div style={{background:"#fff",border:`2px solid ${C.border}`,borderRadius:12,padding:14,gridColumn:wide?"1 / -1":undefined,boxShadow:`0 3px 0 0 ${C.border}`}}>
      <div style={{fontSize:11,color:C.teal,marginBottom:4,fontWeight:900,letterSpacing:.5}}>{label}</div>
      <div style={{fontSize:wide?15:22,fontWeight:900,color}}>{value}{unit&&<span style={{fontSize:13,fontWeight:700,marginLeft:2}}>{unit}</span>}</div>
    </div>
  );
}

function CollapsibleBarCard({ title, entries, barColorFn, textColor, borderColor }) {
  const [expanded, setExpanded] = React.useState(false);
  const sorted = [...entries].sort((a,b)=>b[1]-a[1]);
  const max = sorted.reduce((m,[,n])=>Math.max(m,n),1);
  const visible = expanded ? sorted : sorted.slice(0,5);
  const hasMore = sorted.length > 5;
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,border:`2px solid ${C.border}`,boxShadow:`0 3px 0 0 ${C.border}`}}>
      <div style={{fontSize:11,color:C.teal,fontWeight:900,letterSpacing:1,marginBottom:12}}>{title}</div>
      {visible.map(([name,n],i)=>{
        const rank = sorted.indexOf(sorted.find(([k])=>k===name));
        return (
          <div key={name} style={{marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <div style={{width:20,height:20,borderRadius:6,background:rank===0?"linear-gradient(135deg,#f0a830,#e8886a)":"#f0ece4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:10,fontWeight:900,color:rank===0?"#fff":C.muted}}>{rank+1}</span>
              </div>
              <span style={{flex:1,fontSize:13,fontWeight:rank===0?800:600,color:rank===0?C.text:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
              <span style={{fontSize:13,fontWeight:800,color:textColor,flexShrink:0}}>{n}次</span>
            </div>
            <div style={{height:8,background:"#f0ece4",borderRadius:4,overflow:"hidden",marginLeft:28}}>
              <div style={{height:"100%",width:`${n/max*100}%`,background:barColorFn(rank),borderRadius:4}}/>
            </div>
          </div>
        );
      })}
      {hasMore && (
        <button onClick={()=>setExpanded(v=>!v)}
          style={{width:"100%",marginTop:4,padding:"6px 0",background:"#f5f0e8",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4,color:C.muted,fontSize:12,fontWeight:800}}>
          {expanded ? "收起 ︿" : `展开全部 ${sorted.length} 项 ︾`}
        </button>
      )}
    </div>
  );
}

function BottomNav({ page, navigate, prevPage }) {
  const tabs = [
    { key:"calendar", icon:"📅", label:"偶活日历" },
    { key:"list",     icon:"📋", label:"演出汇总" },
    { key:"annivs",   icon:"💫", label:"纪念日" },
    { key:"settings", icon:"⚙️", label:"我的设置" },
  ];
  return (
    <nav className="bottom-nav">
      {tabs.map(t => (
        <button key={t.key} className={`bnav-btn ${(page===t.key||(page==="anniv-detail"&&t.key===(prevPage||"annivs")))?"active":""}`} onClick={()=>navigate(t.key)}>
          <div className="bnav-icon">{t.icon}</div>
          <div className="bnav-label">{t.label}</div>
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
